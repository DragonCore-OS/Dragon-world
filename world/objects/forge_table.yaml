id: forge_table
name: 锻造台
type: workbench
room: workshop
description: |
  一张由黑铁与青铜铸成的厚重工作台，表面布满了烧灼痕迹与精密的刻度线。
  天工监理在这里将设计图纸转化为实体装置，也是世界补丁的物理封装场所。
  台面上永远摆放着几件半成品，等待着下一次锤击。
interactions:
  inspect:
    text: "锻造台上散落着几张图纸和一组精密齿轮，中央的熔炉散发着余热。"
    effect: "显示当前工作台状态与待加工项目"
  craft:
    text: "你将材料放上锻造台，天工监理的机械臂开始按照图纸进行加工。"
    effect: "启动 crafting 流程（需足够材料与权限）"
  repair:
    text: "破损的部件被固定在台钳上，电弧闪过，裂缝逐渐被金属填充。"
    effect: "修复指定 object（需天工监理权限）"
status_text: "锻造台熔炉温度 840°C，当前有一个项目正在排队。"
