id: star_map
name: 星图盘
type: holographic_projector
room: observatory
description: |
  一个直径约三米的悬浮圆盘，表面投射着 DragonWorld 之外的无尽虚空与星辰分布。
  星图盘不仅显示天文景象，还映射着外部系统、数据源与世界边界的相对位置。
  它是观测外部威胁、规划世界扩展方向的重要工具。
interactions:
  inspect:
    text: "星图盘缓缓旋转，显示出当前世界边界与几个邻近数据节点的相对位置。"
    effect: "显示世界边界状态与外部连接摘要"
  zoom:
    text: "你将视角拉近某颗星辰，更多的细节浮现出来——那似乎是一个尚未接入的外部数据源。"
    effect: "显示指定外部节点的详细信息"
  trace:
    text: "星图盘追踪到一条异常信号轨迹，一条红色的细线划过虚空。"
    effect: "标记并记录外部异常信号（高权限功能）"
status_text: "星图盘投影稳定，检测到 4 个活跃外部节点，1 条待确认异常轨迹。"
